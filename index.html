<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自习小镇</title>
<style>
  /*
    主页的样式比较简单:
    一个标题 + 一行"水量显示" + 一片可以点击的"建筑"格子
  */
  *{ box-sizing: border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:#f3f7f4;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    color:#2c3a32;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 16px;
  }
  h1{
    font-size:24px;
    font-weight:600;
    margin-bottom:6px;
  }
  .subtitle{
    font-size:13px;
    color:#6b7a70;
    margin-bottom:24px;
  }
  .water-bar{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:14px;
    color:#1c6e92;
    background:white;
    border:1px solid #cfe3df;
    border-radius:20px;
    padding:6px 16px;
    margin-bottom:36px;
  }
  .water-bar b{ font-size:16px; }

  /* 小镇的"建筑"用网格摆放,以后加新功能就在这个网格里多加一个 .building */
  .town-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap:18px;
    width:100%;
    max-width:420px;
  }
  .building{
    background:white;
    border:1px solid #dfe9e4;
    border-radius:16px;
    padding:20px 12px;
    text-align:center;
    text-decoration:none;
    color:inherit;
    transition: transform .12s, box-shadow .12s;
    cursor:pointer;
  }
  .building:hover{
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.06);
  }
  .building .icon{
    font-size:36px;
    display:block;
    margin-bottom:8px;
  }
  .building .name{
    font-size:13px;
    font-weight:500;
  }
  /* 还没做出来的功能,先放个"敬请期待"占位,点了没反应 */
  .building.disabled{
    opacity:0.45;
    cursor:default;
  }
  .building.disabled:hover{
    transform:none;
    box-shadow:none;
  }
</style>
</head>
<body>

<h1>自习小镇</h1>
<p class="subtitle">挑一个地方,开始今天的专注</p>

<!-- 这里显示的水量,数据来自 water-store.js,跟番茄钟页面共享同一份 -->
<div class="water-bar">
  💧 当前水量 <b id="waterCount">0</b> 滴
</div>

<!--
  小镇网格:每一个 .building 就是一个可点击的"地点"
  冰块番茄钟是第一个,链接到 ice-pomodoro.html
  后面两个是占位,以后你做好新页面了,把 disabled 删掉、href 改成对应文件名即可
-->
<div class="town-grid">

  <a class="building" href="ice-pomodoro.html">
    <span class="icon">🧊</span>
    <span class="name">冰块番茄钟</span>
  </a>

  <div class="building disabled">
    <span class="icon">☕️</span>
    <span class="name">敬请期待</span>
  </div>

  <div class="building disabled">
    <span class="icon">🏠</span>
    <span class="name">敬请期待</span>
  </div>

</div>

<!-- 引入公共的水量模块,才能用 getWater() / renderWaterTo() 这些函数 -->
<script src="water-store.js"></script>
<script>
  // 一进这个页面,就把水量显示出来
  renderWaterTo('waterCount');
</script>

</body>
</html>
